<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180">
  <!-- Ciel -->
  <rect x="0" y="0" width="240" height="100" fill="#e3f2fd"/>
  <!-- Soleil -->
  <circle cx="200" cy="35" r="22" fill="#ffeb3b"/>
  <line x1="200" y1="5" x2="200" y2="0" stroke="#ffc107" stroke-width="2"/>
  <line x1="220" y1="15" x2="225" y2="10" stroke="#ffc107" stroke-width="2"/>
  <line x1="228" y1="35" x2="234" y2="35" stroke="#ffc107" stroke-width="2"/>
  <line x1="220" y1="55" x2="225" y2="60" stroke="#ffc107" stroke-width="2"/>
  <line x1="180" y1="55" x2="175" y2="60" stroke="#ffc107" stroke-width="2"/>
  <line x1="172" y1="35" x2="166" y2="35" stroke="#ffc107" stroke-width="2"/>
  <line x1="180" y1="15" x2="175" y2="10" stroke="#ffc107" stroke-width="2"/>
  <!-- Nuages -->
  <ellipse cx="60" cy="30" rx="30" ry="15" fill="white"/>
  <ellipse cx="80" cy="25" rx="25" ry="15" fill="white"/>
  <ellipse cx="45" cy="28" rx="20" ry="12" fill="white"/>
  <!-- Sol/gazon -->
  <rect x="0" y="95" width="240" height="85" fill="#66bb6a"/>
  <!-- Gazon avec texture -->
  <rect x="0" y="95" width="240" height="30" fill="#81c784"/>
  <!-- Chemin -->
  <path d="M100 180 Q120 140 130 95" stroke="#bcaaa4" stroke-width="20" fill="none" stroke-linecap="round"/>
  <!-- Arbres gauche -->
  <rect x="20" y="65" width="12" height="40" fill="#6d4c41" rx="3"/>
  <circle cx="26" cy="60" r="25" fill="#4a8c40"/>
  <circle cx="15" cy="65" r="18" fill="#5a9e50"/>
  <!-- Arbres droite -->
  <rect x="185" y="70" width="10" height="35" fill="#6d4c41" rx="3"/>
  <circle cx="190" cy="65" r="22" fill="#4a8c40"/>
  <!-- Petites fleurs dans le gazon -->
  <circle cx="50" cy="120" r="5" fill="#ff8a65"/>
  <circle cx="150" cy="115" r="4" fill="#ff6ec7"/>
  <circle cx="70" cy="135" r="4" fill="#ffeb3b"/>
  <circle cx="175" cy="130" r="5" fill="#ff8a65"/>
</svg>
