<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <!-- Tige -->
  <path d="M100 200 Q95 160 100 130" stroke="#4a8c40" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Feuille gauche -->
