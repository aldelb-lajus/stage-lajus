  <!-- Feuille droite -->
  <ellipse cx="120" cy="155" rx="22" ry="10" fill="#5a9e50" transform="rotate(30 120 155)"/>
  <!-- Pétales (8 pétales autour du centre) -->
  <ellipse cx="100" cy="90" rx="15" ry="35" fill="#ff6ec7" opacity="0.9"/>
  <ellipse cx="100" cy="90" rx="15" ry="35" fill="#ff6ec7" opacity="0.9" transform="rotate(45 100 110)"/>
  <ellipse cx="100" cy="90" rx="15" ry="35" fill="#ff9eb5" opacity="0.9" transform="rotate(90 100 110)"/>
  <ellipse cx="100" cy="90" rx="15" ry="35" fill="#ff6ec7" opacity="0.9" transform="rotate(135 100 110)"/>
  <!-- Centre de la fleur -->
  <circle cx="100" cy="110" r="22" fill="#ffeb3b"/>
  <circle cx="100" cy="110" r="15" fill="#ffc107"/>
  <!-- Points du centre -->
  <circle cx="93" cy="105" r="3" fill="#ff8f00"/>
  <circle cx="107" cy="105" r="3" fill="#ff8f00"/>
  <circle cx="100" cy="100" r="3" fill="#ff8f00"/>
