<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 160">
  <!-- Sol -->
  <rect x="0" y="140" width="220" height="20" rx="5" fill="#8d6e63" opacity="0.5"/>
  <!-- Haie de base (rectangulaire, taillée) -->
  <rect x="10" y="60" width="200" height="85" rx="8" fill="#3a7a30"/>
  <!-- Texture / volumes -->
  <rect x="10" y="60" width="65" height="85" rx="8" fill="#4a8c40"/>
  <rect x="78" y="60" width="65" height="85" rx="8" fill="#3e8035"/>
  <rect x="145" y="60" width="65" height="85" rx="8" fill="#4a8c40"/>
  <!-- Dessus arrondi (comme une haie bien taillée) -->
  <ellipse cx="42" cy="62" rx="34" ry="18" fill="#5a9e50"/>
  <ellipse cx="110" cy="62" rx="34" ry="18" fill="#4e9244"/>
  <ellipse cx="178" cy="62" rx="34" ry="18" fill="#5a9e50"/>
  <!-- Quelques feuilles -->
  <circle cx="30" cy="55" r="8" fill="#6ab060"/>
  <circle cx="55" cy="50" r="7" fill="#6ab060"/>
  <circle cx="100" cy="52" r="9" fill="#60a856"/>
  <circle cx="125" cy="50" r="7" fill="#6ab060"/>
  <circle cx="165" cy="54" r="8" fill="#6ab060"/>
  <circle cx="190" cy="52" r="7" fill="#6ab060"/>
  <!-- Outil de taille (sécateur simplifié) -->
  <line x1="185" y1="25" x2="200" y2="45" stroke="#9e9e9e" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="25" x2="185" y2="45" stroke="#9e9e9e" stroke-width="3" stroke-linecap="round"/>
</svg>
